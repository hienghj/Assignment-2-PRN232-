<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LUXE Clothing Store - Premium fashion at your fingertips. Shop the latest trends in clothing.">
    <title>LUXE - Premium Clothing Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" onclick="navigateTo('home')">
                <span class="logo-icon"><i class="fas fa-gem"></i></span>
                <span class="logo-text">LUXE</span>
            </a>

            <div class="nav-links" id="navLinks">
                <a href="#" class="nav-link active" data-page="home" onclick="navigateTo('home')">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="#" class="nav-link" data-page="cart" onclick="navigateTo('cart')" id="navCart">
                    <i class="fas fa-shopping-bag"></i> Cart
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="#" class="nav-link auth-only" data-page="orders" onclick="navigateTo('orders')" style="display:none">
                    <i class="fas fa-receipt"></i> Orders
                </a>
                <a href="#" class="nav-link auth-only" data-page="manage" onclick="navigateTo('manage')" style="display:none">
                    <i class="fas fa-cog"></i> Manage
                </a>
            </div>

            <div class="nav-actions">
                <div class="auth-buttons" id="authButtons">
                    <button class="btn btn-ghost" onclick="navigateTo('login')" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button class="btn btn-primary" onclick="navigateTo('register')" id="registerBtn">
                        Sign Up
                    </button>
                </div>
                <div class="user-menu" id="userMenu" style="display:none">
                    <div class="user-avatar" onclick="toggleUserDropdown()">
                        <i class="fas fa-user"></i>
                        <span id="userName">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="#" onclick="navigateTo('orders')"><i class="fas fa-receipt"></i> My Orders</a>
                        <a href="#" onclick="navigateTo('manage')"><i class="fas fa-boxes-stacked"></i> Manage Products</a>
                        <hr>
                        <a href="#" onclick="logout()" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>

            <button class="nav-toggle" id="navToggle" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Pages will be loaded here dynamically -->
    </main>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-ring"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
